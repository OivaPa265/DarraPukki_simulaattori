<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Sudoku 4x4</title>
    <!-- Link to your CSS file for styling -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <h1>Mini Sudoku 4x4</h1>

        <!-- The Main Sudoku Board -->
        <div id="sudoku-board" class="grid-4x4">
            <!-- 16 cells will be generated here by JavaScript later -->
        </div>

        <!-- Message Area (for feedback) -->
        <div id="message-area">
            <p id="top-msg"></p>
            <p id="bottom-msg">Ready to play!</p>
        </div>

        <!-- Control Panel (User input section) -->
        <div class="controls">
            <div class="input-group">
                <input type="number" id="row-input" placeholder="Row (0-3)" min="0" max="3">
                <input type="number" id="col-input" placeholder="Col (0-3)" min="0" max="3">
                <input type="number" id="num-input" placeholder="Num (1-4)" min="1" max="4">
            </div>
            <button id="submit-btn">Place Number</button>
        </div>
    </div>

    <!-- Link to your JavaScript file for logic -->
    <script src="script.js"></script>
</body>
</html>

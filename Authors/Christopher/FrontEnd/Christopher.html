<!DOCTYPE html>
<html lang="Fi">
<head>
    <link rel="Stylesheet" href="Christopher.css">
    <meta charset="UTF-8">
    <title>Darrapukki minipeli</title>
</head>
<body>
<canvas id="canvas" width="1460px" height="786px"></canvas>
<video id="voittoVideo" src="darrapukki.mp4" muted playsinline loop style="display:none"></video>
</body>
<script>


    const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

// Menu
let pelinTila = "menu";
let voittoSaavutettu = false;
const voittoRaja = 10;
voittoVideo.loop = true;
const takaisinNappi = {
    x: 20,
    y: 20,
    w: 140,
    h: 50
};

// Kuvat


const pelaajaImg = new Image();
pelaajaImg.src = "Kuvat/pukki.png";

const kaljaImg = new Image();
kaljaImg.src = "Kuvat/bisse.png";

const vihuImg = new Image();
vihuImg.src = "Kuvat/poliisi.png";


// Pelaaja sprite


const spriteLeveys = 48;
const spriteKorkeus = 48;
const skaala = 1.4;

// vihu sprite
const vihuFrameLeveys = 32;
const vihuFrameKorkeus = 48;


// Animaatio muuttujat


let frameX = 0;
let frameY = 0;
let frameAjastin = 0;




// Pelaaja muuttujat

let x = 700;
let y = 300;

let vxl = 0;
let vxr = 0;
let vyl = 0;
let vyr = 0;


// Vihu muuttujat


let vihut = [];
let kiinni = false;
let spawnMerkit = [];
let spawnAjastin = 0;
let spawnVali = 180;
const minSpawnEtaisyys = 200;


// kalja


let pisteet = [];
let aloitusAika = 0;
let kulunutAika = 0;
let kaljaX;
let kaljaY;

window.onload = function () {
    asetaKalja();
    Update();
};


// peli funktio


function Update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    paivitaTakaisinNappi();


    if (pelinTila === "menu") {
        piirraMenu();
        requestAnimationFrame(Update);
        return;
    }

    if (pelinTila === "gameover") {
        piirraGameOver();
        requestAnimationFrame(Update);
        return;
    }

    if (pelinTila === "win") {
    piirraVoitto();
    requestAnimationFrame(Update);
    return;
}


    // varjo

    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);


    // UI

    ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
    ctx.fillRect(10, 10, 160, 40);

    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;
    ctx.strokeRect(10, 10, 160, 40);

    ctx.fillStyle = "white";
    ctx.font = "30px Arial";
    ctx.fillText("Pisteet: " + pisteet.length, 20, 40);


    kulunutAika = Math.floor((Date.now() - aloitusAika) / 1000);

    // AIKA BOXI (keskelle)

    const boxLeveys = 160;
    const boxKorkeus = 40;
    const boxX = canvas.width / 2 - boxLeveys / 2;
    const boxY = 10;

    ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
    ctx.fillRect(boxX, boxY, boxLeveys, boxKorkeus);

    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;
    ctx.strokeRect(boxX, boxY, boxLeveys, boxKorkeus);

    ctx.fillStyle = "white";
    ctx.font = "30px Arial";
    ctx.fillText("Aika: " + kulunutAika, boxX + 10, boxY + 30);


    // tarkista voitto tila
    if (!voittoSaavutettu && pisteet.length >= voittoRaja) {
        voittoSaavutettu = true;
    }


    // Pelaaja animaatio


    const liikkuu = (vxl !== 0 || vxr !== 0 || vyl !== 0 || vyr !== 0);

    if (liikkuu) {
        frameAjastin++;
        if (frameAjastin % 10 === 0) {
            frameX++;
            if (frameX >= 3) frameX = 0;
        }
    } else {
        frameX = 0;
    }


    // SPAWN MERKIT
    for (let i = spawnMerkit.length - 1; i >= 0; i--) {
        let merkki = spawnMerkit[i];

        merkki.ajastin++;

        // piirto
        ctx.shadowColor = "red";
        ctx.shadowBlur = 15;

        ctx.fillStyle = "red";
        ctx.beginPath();
        ctx.arc(merkki.x, merkki.y, 20, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 0;

        // vilkkuva reuna
        if (merkki.ajastin % 20 < 10) {
            ctx.strokeStyle = "white";
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        // spawn vihu viiveellä
        if (merkki.ajastin > 60) {
            vihut.push({
                x: merkki.x,
                y: merkki.y,
                nopeus: 1 + Math.random() * 1.2,
                frameX: 0,
                frameY: 0,
                ajastin: 0
        });

        spawnMerkit.splice(i, 1);
    }
}

    // Vihu AI

    vihut.forEach(vihu => {

    let dx = x - vihu.x;
    let dy = y - vihu.y;

    let etaisyys = Math.sqrt(dx * dx + dy * dy);

    // KIINNI
    if (etaisyys < 35) {
        if (voittoSaavutettu) {
            pelinTila = "win";
            voittoVideo.currentTime = 0;
            voittoVideo.play();
        } else {
            pelinTila = "gameover";
        }
    }


    // Liike
    if (etaisyys !== 0) {
        dx /= etaisyys;
        dy /= etaisyys;
    }

    const pehmennys = 0.9;

    vihu.x += dx * vihu.nopeus * pehmennys;
    vihu.y += dy * vihu.nopeus * pehmennys;

    // Animaatio
    vihu.ajastin++;
    if (vihu.ajastin % 15 === 0) {
        vihu.frameX++;
        if (vihu.frameX >= 3) vihu.frameX = 0;
    }

    // Suunta
    if (Math.abs(dx) > Math.abs(dy)) {
        vihu.frameY = dx > 0 ? 2 : 1;
    } else {
        vihu.frameY = dy > 0 ? 0 : 3;
    }

    // Piirto
    ctx.shadowColor = "white";
    ctx.shadowBlur = 8;

    ctx.drawImage(
        vihuImg,
        vihu.frameX * vihuFrameLeveys,
        vihu.frameY * vihuFrameKorkeus,
        vihuFrameLeveys,
        vihuFrameKorkeus,
        vihu.x,
        vihu.y,
        64,
        64
    );

    ctx.shadowBlur = 0;

    });

    spawnAjastin++;

    if (spawnAjastin >= spawnVali) {
        spawnAjastin = 0;

        if (vihut.length < 200) {
            spawnaaYksiVihu();
        }
    }
    if (spawnVali > 80) {
        spawnVali = Math.max(80, spawnVali - 0.02);
    }



    // draw pelaaaja


    ctx.shadowColor = "black";
    ctx.shadowBlur = 8;

    ctx.drawImage(
        pelaajaImg,
        frameX * spriteLeveys,
        frameY * spriteKorkeus,
        spriteLeveys,
        spriteKorkeus,
        x,
        y,
        spriteLeveys * skaala,
        spriteKorkeus * skaala
    );

    ctx.shadowBlur = 0;


    // draw kaljs

    ctx.shadowColor = "yellow";
    ctx.shadowBlur = 8;
    ctx.drawImage(kaljaImg, kaljaX - 16, kaljaY - 16, 80, 80);
    ctx.shadowBlur = 0;


    ctx.shadowBlur = 0;


    // Pelaaja liike
    if (kiinni) return;
    x += vxl + vxr;
    y += vyl + vyr;

    x = Math.max(0, Math.min(canvas.width - spriteLeveys * skaala, x));
    y = Math.max(0, Math.min(canvas.height - spriteKorkeus * skaala, y));



    // Kalja kollisio

    const pelaajaKoko = spriteLeveys * skaala;

    if (
        x < kaljaX + 30 &&
        x + pelaajaKoko > kaljaX &&
        y < kaljaY + 30 &&
        y + pelaajaKoko > kaljaY
    ) {
        pisteet.push(1);
        asetaKalja();
    }


    // jäät kiinni
    if (kiinni) {
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "white";
    ctx.font = "60px Arial";
    ctx.fillText("KIINNI JÄIT!", canvas.width / 2 - 180, canvas.height / 2);

    return;
    }

    requestAnimationFrame(Update);
}


// Ohjaus

addEventListener("keydown", function (e) {
    if (e.code === "KeyD") { vxr = 3; frameY = 2; }
    if (e.code === "KeyA") { vxl = -3; frameY = 1; }
    if (e.code === "KeyW") { vyr = -3; frameY = 3; }
    if (e.code === "KeyS") { vyl = 3; frameY = 0; }
});

addEventListener("keyup", function (e) {
    if (e.code === "KeyD") vxr = 0;
    if (e.code === "KeyA") vxl = 0;
    if (e.code === "KeyW") vyr = 0;
    if (e.code === "KeyS") vyl = 0;
});

canvas.addEventListener("click", function(e) {

    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;

    const hiiriX = (e.clientX - rect.left) * scaleX;
    const hiiriY = (e.clientY - rect.top) * scaleY;

    // TAKAISIN-NAPPI
    if (
        hiiriX > takaisinNappi.x &&
        hiiriX < takaisinNappi.x + takaisinNappi.w &&
        hiiriY > takaisinNappi.y &&
        hiiriY < takaisinNappi.y + takaisinNappi.h
    ) {
        pelinTila = "menu";
        return;
    }

    // MENU
    if (pelinTila === "menu") {
        if (
            hiiriX > canvas.width/2 - 100 &&
            hiiriX < canvas.width/2 + 100 &&
            hiiriY > 250 &&
            hiiriY < 310
        ) {
            aloitaPeli();
        }
    }

    // GAME OVER
    if (pelinTila === "gameover") {
        if (
            hiiriX > canvas.width/2 - 100 &&
            hiiriX < canvas.width/2 + 100 &&
            hiiriY > 280 &&
            hiiriY < 340
        ) {
            aloitaPeli();
        }
    }

    // WIN
    if (pelinTila === "win") {
        if (
            hiiriX > canvas.width/2 - 100 &&
            hiiriX < canvas.width/2 + 100 &&
            hiiriY > 450 &&
            hiiriY < 510
        ) {
            aloitaPeli();
        }
    }


});

    // voitto video
    if (pelinTila === "win") {
        if (voittoVideo.paused) {
            voittoVideo.play();
    }
    piirraVoitto();
    requestAnimationFrame(Update);

}


// Kaljan spawnaus


function asetaKalja() {
    const reunus = 40;
    kaljaX = reunus + Math.random() * (canvas.width - reunus * 2);
    kaljaY = reunus + Math.random() * (canvas.height - reunus * 2);
}

// menu funktiot

function piirraMenu() {
    ctx.fillStyle = "rgba(0,0,0,0.8)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "white";
    ctx.font = "60px Arial";
    ctx.fillText("KALJA JAHTI", canvas.width / 2 - 180, 150);
    ctx.fillStyle = "green";
    ctx.fillRect(canvas.width/2 - 100, 250, 200, 60);
    ctx.fillStyle = "white";
    ctx.font = "30px Arial";
    ctx.fillText("Aloita", canvas.width/2 - 50, 290);

    piirraTakaisinNappi();
}

function piirraGameOver() {
    ctx.fillStyle = "rgba(0,0,0,0.8)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "white";
    ctx.font = "50px Arial";
    ctx.fillText("HÄVISIT!", canvas.width/2 - 120, 150);

    ctx.font = "30px Arial";
    ctx.fillText("Pisteet: " + pisteet.length, canvas.width/2 - 90, 220);

    ctx.fillStyle = "red";
    ctx.fillRect(canvas.width/2 - 100, 280, 210, 60);

    ctx.fillStyle = "white";
    ctx.fillText("Yritä uudelleen", canvas.width/2 - 95, 320);

    piirraTakaisinNappi();
}

function piirraVoitto() {
    // tausta
    ctx.fillStyle = "rgba(0,0,0,0.85)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 🎥 VIDEO LAATIKKO
    const videoLeveys = 320;
    const videoKorkeus = 180;
    const videoX = canvas.width / 2 - videoLeveys / 2;
    const videoY = 80;

    if (!voittoVideo.paused && !voittoVideo.ended) {
        ctx.drawImage(voittoVideo, videoX, videoY, videoLeveys, videoKorkeus);
    }

    // kehys videolle
    ctx.strokeStyle = "white";
    ctx.lineWidth = 3;
    ctx.strokeRect(videoX, videoY, videoLeveys, videoKorkeus);
    ctx.shadowColor = "black";
    ctx.shadowBlur = 20;

    // TEKSTI
    ctx.fillStyle = "yellow";
    ctx.font = "50px Arial";
    ctx.fillText("VOITIT PELIN!", canvas.width / 2 - 170, 320);

    ctx.fillStyle = "white";
    ctx.font = "25px Arial";
    ctx.fillText("Selvisit poliisista!", canvas.width / 2 - 120, 370);

    ctx.fillText("Pisteet: " + pisteet.length, canvas.width / 2 - 80, 410);

    // nappi
    ctx.fillStyle = "green";
    ctx.fillRect(canvas.width / 2 - 100, 450, 200, 60);

    ctx.fillStyle = "white";
    ctx.fillText("Uusi peli", canvas.width / 2 - 70, 490);

    piirraTakaisinNappi();

}

function piirraTakaisinNappi() {
    ctx.fillStyle = "blue";
    ctx.fillRect(takaisinNappi.x, takaisinNappi.y, takaisinNappi.w, takaisinNappi.h);

    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;
    ctx.strokeRect(takaisinNappi.x, takaisinNappi.y, takaisinNappi.w, takaisinNappi.h);

    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("Takaisin", takaisinNappi.x + 20, takaisinNappi.y + 30);

}

function paivitaTakaisinNappi() {
    const w = 140;
    const h = 50;

    takaisinNappi.w = w;
    takaisinNappi.h = h;

    // keskelle
    takaisinNappi.x = canvas.width / 2 - w / 2;

    if (pelinTila === "menu") {
        takaisinNappi.y = 330;
    }

    if (pelinTila === "gameover") {
        takaisinNappi.y = 360;
    }

    if (pelinTila === "win") {
        takaisinNappi.y = 540;
    }
}

function aloitaPeli() {
    pelinTila = "peli";

    aloitusAika = Date.now();

    kiinni = false;

    voittoSaavutettu = false;

    voittoVideo.pause();
    voittoVideo.currentTime = 0;

    pisteet = [];
    x = 700;
    y = 300;


    vxl = vxr = vyl = vyr = 0;

    spawnAjastin = 0;

    vihut = []
    spawnMerkit = [];

    spawnVali = 180;



    asetaKalja();
}


function spawnaaYksiVihu() {
    let spawnX, spawnY;
    let liianLahella;
    do {
        let reuna = Math.floor(Math.random() * 4);

        if (reuna === 0) { spawnX = 0; spawnY = Math.random() * canvas.height; }
        if (reuna === 1) { spawnX = canvas.width; spawnY = Math.random() * canvas.height; }
        if (reuna === 2) { spawnX = Math.random() * canvas.width; spawnY = 0; }
        if (reuna === 3) { spawnX = Math.random() * canvas.width; spawnY = canvas.height; }

        let dx = spawnX - x;
        let dy = spawnY - y;
        let etaisyys = Math.sqrt(dx * dx + dy * dy);

        liianLahella = etaisyys < minSpawnEtaisyys;


    } while (liianLahella);

    spawnMerkit.push({
        x: spawnX,
        y: spawnY,
        ajastin: 0
    });
}


</script>
</html>

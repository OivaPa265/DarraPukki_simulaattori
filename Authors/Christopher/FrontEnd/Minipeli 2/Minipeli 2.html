<!DOCTYPE html>
<html lang="Fi">
<head>
    <link rel="Stylesheet" href="Mini.css">
    <meta charset="UTF-8">
    <title>Darrapukki minipeli</title>
</head>
<body>

<canvas id="canvas" width="1460px" height="786px"></canvas>

<script>
  const canvas = document.getElementById("canvas")
  const ctx = canvas.getContext("2d")

  let x = 700;
  let y = 300;
  let vxl = 0;
  let vxr = 0;
  let vyl = 0;
  let vyr = 0;


  function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height)
    x += vxl;
    x += vxr;
    y += vyl;
    y += vyr;
    ctx.font = "50px serif";
    ctx.fillText("😶‍🌫️", x, y)
    requestAnimationFrame(update)
  }
  update()

  addEventListener("keydown", function(e){
    if (e.code === 'KeyD') vxr = 5;
    if (e.code === 'KeyA') vxl = -5;
    if (e.code === 'KeyW') vyr = -5;
    if (e.code === 'KeyS') vyl = 5;
  })
  addEventListener("keyup", function(e){
    if (e.code === 'KeyD') vxr = 0;
    if (e.code === 'KeyA') vxl = 0;
    if (e.code === 'KeyW') vyr = 0;
    if (e.code === 'KeyS') vyl = 0;
  })
</script>
</body>
</html>
